<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record System</title>

    <!-- CSS -->
    <link rel="stylesheet" href="srs.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- Header -->
        <header>
            <h1><i class="fa-solid fa-user-graduate"></i> Student Record System</h1>
            <p>Manage Student Records with CRUD Operations</p>
        </header>

        <!-- Student Form -->
        <section class="form-section">

            <h2>Student Information</h2>

            <form id="studentForm">

                <div class="input-group">
                    <label>Student Name</label>
                    <input type="text" id="name" placeholder="Enter Student Name">
                </div>

                <div class="input-group">
                    <label>Roll Number</label>
                    <input type="text" id="roll" placeholder="Enter Roll Number">
                </div>

                <div class="input-group">
                    <label>Course</label>
                    <input type="text" id="course" placeholder="Enter Course">
                </div>

                <div class="input-group">
                    <label>Branch</label>
                    <input type="text" id="branch" placeholder="Enter Branch">
                </div>

                <div class="input-group">
                    <label>Semester</label>
                    <input type="number" id="semester" placeholder="Semester">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter Email">
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter Phone Number">
                </div>

                <div class="button-group">

                    <button type="button" id="addBtn">
                        <i class="fa-solid fa-plus"></i>
                        Add Student
                    </button>

                    <button type="button" id="updateBtn">
                        <i class="fa-solid fa-pen"></i>
                        Update
                    </button>

                    <button type="reset">
                        <i class="fa-solid fa-eraser"></i>
                        Clear
                    </button>

                </div>

            </form>

        </section>

        <!-- Search -->
        <section class="search-section">

            <input type="text" id="search" placeholder="🔍 Search by Name or Roll Number">

        </section>

        <!-- Student Table -->
        <section class="table-section">

            <table id="studentTable">

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Course</th>
                        <th>Branch</th>
                        <th>Semester</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>

                </thead>

                <tbody id="tableBody">

                    <!-- JavaScript will add rows here -->

                </tbody>

            </table>

        </section>

    </div>

    <!-- JavaScript -->
    <script src="srs.js"></script>

</body>

</html>
